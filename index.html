<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UltrasoundViz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:         #f3efe8;
      --surface:    #fdfcfa;
      --panel-bg:   #ffffff;
      --border:     #ddd5c5;
      --border-hi:  #c4b8a4;
      --accent:     #b85535;
      --accent-hi:  #d4672a;
      --accent-lo:  rgba(184, 85, 53, 0.07);
      --text:       #2a201a;
      --muted:      #8a7a6c;
      --dim:        #b8aba0;
      --green:      #2a7a4a;
      --red:        #c03030;
      --orange:     #c06010;
      --lora:       'Lora', Georgia, serif;
      --sans:       'DM Sans', system-ui, sans-serif;
      --mono:       'DM Mono', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════
       DROP ZONE STATE
    ═══════════════════════════════════════ */

    #state-drop {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .drop-wordmark {
      font-family: var(--lora);
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .drop-tagline {
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 40px;
      letter-spacing: 0.2px;
    }

    /* The drop zone is a <label> — clicking natively opens the file chooser,
       no JavaScript needed. This is the most reliable cross-browser approach. */
    .drop-zone {
      width: 460px;
      border: 1.5px dashed var(--border-hi);
      border-radius: 12px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      padding: 52px 40px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-lo);
    }

    .drop-icon {
      width: 44px;
      height: 44px;
      color: var(--dim);
      transition: color 0.2s;
    }

    .drop-zone:hover .drop-icon,
    .drop-zone.drag-over .drop-icon {
      color: var(--accent);
    }

    .drop-title {
      font-family: var(--lora);
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
    }

    .drop-sub {
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
    }

    .drop-formats {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .drop-hint {
      font-size: 11.5px;
      font-weight: 300;
      color: var(--dim);
      margin-top: 10px;
    }

    /* ═══════════════════════════════════════
       LOADING STATE
    ═══════════════════════════════════════ */

    #state-loading {
      height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    .loading-wordmark {
      font-family: var(--lora);
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-status {
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      min-height: 18px;
    }

    /* ═══════════════════════════════════════
       DASHBOARD STATE
    ═══════════════════════════════════════ */

    #state-dashboard {
      height: 100vh;
      display: none;
      flex-direction: column;
      background: var(--bg);
    }

    /* Header */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      font-family: var(--lora);
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .brand-accent {
      color: var(--accent);
    }

    .header-badges {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* Stats strip */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat-card {
      padding: 14px 22px;
      border-right: 1px solid var(--border);
    }

    .stat-card:last-child {
      border-right: none;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--dim);
      margin-bottom: 5px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
      line-height: 1.1;
    }

    .stat-sub {
      font-size: 11px;
      font-weight: 300;
      color: var(--muted);
      margin-top: 3px;
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 1px;
      opacity: 0.85;
    }

    /* Main panels */
    .main-panels {
      display: flex;
      flex: 1;
      min-height: 0;
      padding: 14px 18px;
      gap: 14px;
    }

    .panel-left {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 7px;
    }

    .panel-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 7px;
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--dim);
      flex-shrink: 0;
    }

    /* canvas wrapper — renderCanvas reads this element's clientWidth/Height */
    .panel-canvas-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #scan-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .panel-3d-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    #three-container {
      position: absolute;
      inset: 0;
    }

    /* Footer */
    .dash-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .footer-info {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.5px;
    }

    .btn-load-new {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 16px;
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-load-new:hover {
      background: var(--accent-lo);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Error toast */
    #error-toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff5f5;
      border: 1px solid rgba(192, 48, 48, 0.3);
      color: var(--red);
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 400;
      display: none;
      z-index: 999;
      max-width: 80vw;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<!-- ── State 1: Drop Zone ─────────────────────────────────────────────────── -->
<div id="state-drop">
  <div class="drop-wordmark">UltrasoundViz</div>
  <div class="drop-tagline">Medical imaging · AI segmentation · 3D terrain</div>

  <!--
    Using <label for="file-input"> is the most reliable cross-browser way to
    open a file chooser on click — no JavaScript programmatic .click() needed.
  -->
  <label class="drop-zone" id="drop-zone" for="file-input">
    <svg class="drop-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M22 28V16M22 16L17 21M22 16L27 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 32h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <rect x="6" y="6" width="32" height="32" rx="6" stroke="currentColor" stroke-width="1.5"/>
    </svg>
    <div class="drop-title">Drop any ultrasound file here</div>
    <div class="drop-sub">
      or click to browse<br>
      Runs the full AI segmentation pipeline
    </div>
    <div class="drop-formats">MHD · JPG · PNG · BMP · DCM · AVI · MP4</div>
  </label>

  <!-- MHD note: upload the .mhd and .raw together -->
  <div class="drop-hint">For MHD files, select both the .mhd and .raw files together</div>

  <input type="file" id="file-input" style="display:none" multiple
         accept=".mhd,.raw,.jpg,.jpeg,.png,.bmp,.dcm,.avi,.mp4">
</div>

<!-- ── State 2: Loading ───────────────────────────────────────────────────── -->
<div id="state-loading">
  <div class="loading-wordmark">UltrasoundViz</div>
  <div class="loading-spinner"></div>
  <div class="loading-status" id="loading-status">Initializing…</div>
</div>

<!-- ── State 3: Dashboard ─────────────────────────────────────────────────── -->
<div id="state-dashboard">

  <header class="dash-header">
    <div class="brand">Ultrasound<span class="brand-accent">Viz</span></div>
    <div class="header-badges" id="header-badges"></div>
  </header>

  <div class="stats-row" id="stats-row"></div>

  <div class="main-panels">
    <div class="panel-left">
      <div class="panel-label">2D Scan · Mask Overlay</div>
      <div class="panel-canvas-wrap">
        <canvas id="scan-canvas"></canvas>
      </div>
    </div>
    <div class="panel-right">
      <div class="panel-label">3D Terrain · Interactive</div>
      <div class="panel-3d-wrap">
        <div id="three-container"></div>
      </div>
    </div>
  </div>

  <footer class="dash-footer">
    <span class="footer-info" id="footer-info"></span>
    <button class="btn-load-new" id="btn-load-new">← Load new file</button>
  </footer>

</div>

<!-- ── Error toast ────────────────────────────────────────────────────────── -->
<div id="error-toast"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Config ───────────────────────────────────────────────────────────────────

const API = 'http://localhost:8000/analyze';

const BADGE = {
  JugularVein:   { bg:'#dbeafe', text:'#1d4ed8', border:'#bfdbfe', rgb:[59,130,246] },
  CarotidArtery: { bg:'#cffafe', text:'#0e7490', border:'#a5f3fc', rgb:[6,182,212] },
  FemoralArtery: { bg:'#cffafe', text:'#0e7490', border:'#a5f3fc', rgb:[6,182,212] },
  LIDC:          { bg:'#fee2e2', text:'#b91c1c', border:'#fecaca', rgb:[185,28,28] },
  Heart:         { bg:'#ffedd5', text:'#c2410c', border:'#fed7aa', rgb:[194,65,12] },
  Ball:          { bg:'#d1fae5', text:'#065f46', border:'#a7f3d0', rgb:[5,150,105] },
};
const DEFAULT_BADGE = { bg:'#f0ece6', text:'#6b5c52', border:'#ddd5c5', rgb:[107,92,82] };
const badgeFor = a => BADGE[a] || DEFAULT_BADGE;
const pctColor = v => v >= 75 ? '#2a7a4a' : v >= 50 ? '#c06010' : '#c03030';
const parsePct = s => parseFloat((s||'0').replace('%','')) || 0;

// ── Three.js state ────────────────────────────────────────────────────────────

let _renderer = null, _animId = null, _resizeObs = null;

function teardownThree() {
  if (_animId)    { cancelAnimationFrame(_animId); _animId = null; }
  if (_resizeObs) { _resizeObs.disconnect(); _resizeObs = null; }
  if (_renderer)  { _renderer.dispose(); _renderer = null; }
  const c = document.getElementById('three-container');
  if (c) c.innerHTML = '';
}

// ── State machine ─────────────────────────────────────────────────────────────

function showState(s) {
  document.getElementById('state-drop').style.display      = s === 'drop'      ? 'flex' : 'none';
  document.getElementById('state-loading').style.display   = s === 'loading'   ? 'flex' : 'none';
  document.getElementById('state-dashboard').style.display = s === 'dashboard' ? 'flex' : 'none';
}

function setStatus(msg) { document.getElementById('loading-status').textContent = msg; }

function showError(msg) {
  const el = document.getElementById('error-toast');
  el.textContent = '⚠  ' + msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 7000);
  showState('drop');
}

// ── File input ────────────────────────────────────────────────────────────────

// The drop zone is a <label for="file-input"> so click-to-browse works natively.
// Only drag-and-drop events need JS.

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files.length) handleFiles(e.target.files);
});

document.getElementById('btn-load-new').addEventListener('click', () => {
  teardownThree();
  document.getElementById('file-input').value = '';
  showState('drop');
});

// ── Upload & analyze ──────────────────────────────────────────────────────────

async function handleFiles(fileList) {
  showState('loading');

  const msgs = ['Detecting format…', 'Running preprocessing…', 'Running inference…'];
  let i = 0;
  setStatus(msgs[i]);
  const ticker = setInterval(() => { i = (i + 1) % msgs.length; setStatus(msgs[i]); }, 900);

  try {
    const fd = new FormData();
    for (const f of fileList) fd.append('files', f);

    const res = await fetch(API, { method: 'POST', body: fd });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Server error ${res.status}`);
    }
    const data = await res.json();
    clearInterval(ticker);
    setStatus('Rendering 3D…');
    await new Promise(r => setTimeout(r, 200));
    showDashboard(data);
  } catch (err) {
    clearInterval(ticker);
    showError(err.message);
  }
}

// Keep legacy single-file alias for Playwright test hook
const handleFile = f => handleFiles([f]);

// ── Dashboard ─────────────────────────────────────────────────────────────────

function showDashboard(data) {
  showState('dashboard');
  renderHeader(data);
  renderStats(data);
  renderCanvas(data);
  renderTerrain(data);
  document.getElementById('footer-info').textContent =
    `${data.anatomy} · ${data.dimensionality} · rotate · zoom · pan`;
}

function renderHeader(data) {
  const c = badgeFor(data.anatomy);
  document.getElementById('header-badges').innerHTML =
    `<span class="badge" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${data.anatomy}</span>
     <span class="badge" style="background:#f0ece6;color:#8a7a6c;border:1px solid #ddd5c5">
       ${data.format.toUpperCase()} &middot; ${data.dimensionality}
     </span>`;
}

function renderStats(data) {
  const c = badgeFor(data.anatomy);
  const detColor = data.detected ? '#2a7a4a' : '#c03030';
  const detText  = data.detected ? '&#10003; Detected' : '&#10007; Not found';
  const covPct   = parsePct(data.coverage);
  const confPct  = parsePct(data.mean_confidence);
  const covColor  = pctColor(covPct);
  const confColor = pctColor(confPct);

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Anatomy</div>
      <div class="stat-value" style="font-size:16px;color:${c.text}">${data.anatomy}</div>
      <div class="stat-sub">${data.dimensionality}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Detection</div>
      <div class="stat-value" style="font-size:14px;color:${detColor}">${detText}</div>
      <div class="stat-sub">structure in scan</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Coverage</div>
      <div class="stat-value" style="color:${covColor}">${data.coverage}</div>
      <div class="stat-sub">of image area</div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${Math.min(covPct,100)}%;background:${covColor}"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mean Confidence</div>
      <div class="stat-value" style="color:${confColor}">${data.mean_confidence}</div>
      <div class="stat-sub">model certainty</div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${Math.min(confPct,100)}%;background:${confColor}"></div>
      </div>
    </div>`;
}

// ── Canvas (left panel) ───────────────────────────────────────────────────────

function renderCanvas(data) {
  const canvas = document.getElementById('scan-canvas');
  const parent = canvas.parentElement;  // .panel-canvas-wrap
  const cW = parent.clientWidth  || 400;
  const cH = parent.clientHeight || 400;
  canvas.width  = cW;
  canvas.height = cH;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, cW, cH);

  const img = new Image();
  img.onload = () => {
    const scale = Math.min(cW / img.width, cH / img.height);
    const dw = Math.round(img.width  * scale);
    const dh = Math.round(img.height * scale);
    const ox = Math.round((cW - dw) / 2);
    const oy = Math.round((cH - dh) / 2);
    ctx.drawImage(img, ox, oy, dw, dh);

    const mask = data.binary_mask;
    const rows = mask.length, cols = mask[0].length;
    const [r, g, b] = badgeFor(data.anatomy).rgb;

    const off = document.createElement('canvas');
    off.width = cols; off.height = rows;
    const octx = off.getContext('2d');

    const fill = octx.createImageData(cols, rows);
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        if (!mask[y][x]) continue;
        const i = (y * cols + x) * 4;
        fill.data[i]=r; fill.data[i+1]=g; fill.data[i+2]=b; fill.data[i+3]=80;
      }
    }
    octx.putImageData(fill, 0, 0);
    ctx.drawImage(off, ox, oy, dw, dh);

    const contour = octx.createImageData(cols, rows);
    for (let y = 1; y < rows - 1; y++) {
      for (let x = 1; x < cols - 1; x++) {
        if (!mask[y][x]) continue;
        if (!mask[y-1][x] || !mask[y+1][x] || !mask[y][x-1] || !mask[y][x+1]) {
          const i = (y * cols + x) * 4;
          contour.data[i]=r; contour.data[i+1]=g; contour.data[i+2]=b; contour.data[i+3]=220;
        }
      }
    }
    octx.clearRect(0, 0, cols, rows);
    octx.putImageData(contour, 0, 0);
    ctx.drawImage(off, ox, oy, dw, dh);
  };
  img.src = 'data:image/png;base64,' + data.original_image;
}

// ── Three.js terrain (right panel) ───────────────────────────────────────────

function hotColor(t) {
  t = Math.max(0, Math.min(1, t));
  let r, g, b;
  if (t < 0.365) {
    r = t / 0.365; g = 0; b = 0;
  } else if (t < 0.745) {
    r = 1; g = (t - 0.365) / 0.38; b = 0;
  } else {
    r = 1; g = 1; b = (t - 0.745) / 0.255;
  }
  return [r, g, b];
}

function renderTerrain(data) {
  teardownThree();

  const container = document.getElementById('three-container');
  const W = container.clientWidth  || 600;
  const H = container.clientHeight || 400;

  const probMap = data.probability_map;
  const mask    = data.binary_mask;
  const rows    = probMap.length;
  const cols    = probMap[0].length;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0d0d);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);
  _renderer = renderer;

  const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 5000);

  const scaleX      = cols;
  const scaleZ      = rows;
  const heightScale = Math.max(cols, rows) * 0.35;

  const positions = new Float32Array(rows * cols * 3);
  const colors    = new Float32Array(rows * cols * 3);
  const indices   = [];
  let maxH = 0;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const v   = probMap[row][col];
      const h   = v * heightScale;
      if (h > maxH) maxH = h;
      const idx = (row * cols + col) * 3;
      positions[idx]   = (col / (cols - 1) - 0.5) * scaleX;
      positions[idx+1] = h;
      positions[idx+2] = (row / (rows - 1) - 0.5) * scaleZ;
      const [r,g,b] = hotColor(v);
      colors[idx]=r; colors[idx+1]=g; colors[idx+2]=b;
    }
  }

  for (let row = 0; row < rows - 1; row++) {
    for (let col = 0; col < cols - 1; col++) {
      const tl = row * cols + col;
      indices.push(tl, tl+cols, tl+1, tl+1, tl+cols, tl+cols+1);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  scene.add(new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    vertexColors: true, side: THREE.DoubleSide, roughness: 0.75, metalness: 0.1,
  })));

  const linePos = [];
  const contourY = maxH + heightScale * 0.03;
  const xStep = scaleX / (cols - 1);
  const zStep = scaleZ / (rows - 1);

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const here = mask[row][col];
      if (col + 1 < cols && mask[row][col+1] !== here) {
        const x  = (col / (cols-1) - 0.5) * scaleX + xStep * 0.5;
        const z0 = (row / (rows-1) - 0.5) * scaleZ;
        linePos.push(x, contourY, z0,  x, contourY, z0 + zStep);
      }
      if (row + 1 < rows && mask[row+1][col] !== here) {
        const z  = (row / (rows-1) - 0.5) * scaleZ + zStep * 0.5;
        const x0 = (col / (cols-1) - 0.5) * scaleX;
        linePos.push(x0, contourY, z,  x0 + xStep, contourY, z);
      }
    }
  }

  if (linePos.length > 0) {
    const lg = new THREE.BufferGeometry();
    lg.setAttribute('position', new THREE.Float32BufferAttribute(linePos, 3));
    const lineColor = new THREE.Color(badgeFor(data.anatomy).text);
    scene.add(new THREE.LineSegments(lg, new THREE.LineBasicMaterial({ color: lineColor })));
  }

  scene.add(new THREE.AmbientLight(0x666666, 1.2));
  const sun = new THREE.DirectionalLight(0xffffff, 1.8);
  sun.position.set(scaleX * 0.6, heightScale * 2.5, scaleZ * 0.3);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x2244aa, 0.4);
  fill.position.set(-scaleX * 0.5, heightScale, -scaleZ * 0.5);
  scene.add(fill);

  const camDist = Math.max(scaleX, scaleZ) * 1.1;
  camera.position.set(camDist * 0.75, maxH + heightScale * 0.9, camDist * 0.75);
  const target = new THREE.Vector3(0, maxH * 0.25, 0);
  camera.lookAt(target);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.copy(target);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 10;
  controls.maxDistance = camDist * 4;
  controls.update();

  _resizeObs = new ResizeObserver(() => {
    const nW = container.clientWidth;
    const nH = container.clientHeight;
    if (!nW || !nH) return;
    camera.aspect = nW / nH;
    camera.updateProjectionMatrix();
    renderer.setSize(nW, nH);
  });
  _resizeObs.observe(container);

  function animate() {
    _animId = requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
}

window.__handleFile = handleFile;
</script>
</body>
</html>
