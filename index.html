<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UltrasoundViz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:         #05060a;
      --surface:    #090c13;
      --panel:      #0c1019;
      --border:     #172030;
      --border-hi:  #253550;
      --amber:      #c8880a;
      --amber-hi:   #eaa818;
      --amber-dim:  rgba(200, 136, 10, 0.18);
      --amber-glow: rgba(200, 136, 10, 0.07);
      --green:      #3ecf8e;
      --red:        #e85050;
      --orange:     #e88020;
      --text:       #b8ccdc;
      --muted:      #415868;
      --dim:        #20303e;
      --mono:       'IBM Plex Mono', 'Courier New', monospace;
      --sans:       'Outfit', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      overflow: hidden;
    }

    /* Dot grid background — subtle depth */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════
       DROP ZONE STATE
    ═══════════════════════════════════════════ */

    #state-drop {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .drop-eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--amber);
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 32px;
    }

    /* Corner-bracket drop zone — no solid border, just 4 corner marks */
    .drop-zone {
      position: relative;
      width: 500px;
      height: 310px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      overflow: hidden;
      padding: 44px;
      text-align: center;
      /* 4 corners: 4 horizontal + 4 vertical segments */
      background-image:
        linear-gradient(to right, var(--amber), var(--amber)),
        linear-gradient(to right, var(--amber), var(--amber)),
        linear-gradient(to right, var(--amber), var(--amber)),
        linear-gradient(to right, var(--amber), var(--amber)),
        linear-gradient(to bottom, var(--amber), var(--amber)),
        linear-gradient(to bottom, var(--amber), var(--amber)),
        linear-gradient(to bottom, var(--amber), var(--amber)),
        linear-gradient(to bottom, var(--amber), var(--amber));
      background-size:
        30px 1.5px, 30px 1.5px, 30px 1.5px, 30px 1.5px,
        1.5px 30px, 1.5px 30px, 1.5px 30px, 1.5px 30px;
      background-position:
        0 0, 100% 0, 0 100%, 100% 100%,
        0 0, 100% 0, 0 100%, 100% 100%;
      background-repeat: no-repeat;
      background-color: transparent;
      transition: background-color 0.35s;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      background-color: var(--amber-glow);
    }

    /* Scan sweep — amber band that sweeps top→bottom on hover */
    .drop-zone::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 70px;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(200,136,10,0.07) 45%,
        rgba(200,136,10,0.13) 50%,
        rgba(200,136,10,0.07) 55%,
        transparent 100%);
      top: -70px;
      pointer-events: none;
      opacity: 0;
    }

    .drop-zone:hover::after,
    .drop-zone.drag-over::after {
      opacity: 1;
      animation: scan-sweep 2.4s linear infinite;
    }

    @keyframes scan-sweep {
      0%   { top: -70px; }
      100% { top: 100%;  }
    }

    /* Reticle / targeting SVG icon */
    .drop-reticle {
      width: 56px;
      height: 56px;
      color: var(--amber);
      opacity: 0.35;
      transition: opacity 0.35s, transform 0.5s;
      flex-shrink: 0;
    }

    .drop-zone:hover .drop-reticle,
    .drop-zone.drag-over .drop-reticle {
      opacity: 1;
      animation: reticle-spin 14s linear infinite;
    }

    @keyframes reticle-spin { to { transform: rotate(360deg); } }

    .drop-title {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.3px;
    }

    .drop-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.75;
      font-weight: 300;
    }

    .drop-formats {
      font-family: var(--mono);
      font-size: 9.5px;
      color: var(--dim);
      letter-spacing: 2px;
      margin-top: 2px;
    }

    /* ═══════════════════════════════════════════
       LOADING STATE
    ═══════════════════════════════════════════ */

    #state-loading {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .loading-wordmark {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0.45;
    }

    .loading-ring {
      position: relative;
      width: 76px;
      height: 76px;
    }

    /* Static track */
    .loading-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--border);
    }

    /* Spinning arc */
    .loading-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: var(--amber-hi);
      border-right-color: rgba(200,136,10,0.25);
      animation: ring-spin 1.1s cubic-bezier(0.55, 0, 0.45, 1) infinite;
    }

    @keyframes ring-spin { to { transform: rotate(360deg); } }

    /* Inner amber dot */
    .loading-dot {
      position: absolute;
      inset: 50%;
      width: 6px;
      height: 6px;
      margin: -3px;
      background: var(--amber);
      border-radius: 50%;
      box-shadow: 0 0 8px 2px rgba(200,136,10,0.5);
    }

    .loading-status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
      min-height: 16px;
    }

    /* Blinking cursor appended after status text */
    .loading-status::after {
      content: '▋';
      color: var(--amber);
      opacity: 0.7;
      margin-left: 4px;
      animation: cursor-blink 1.1s step-end infinite;
    }

    @keyframes cursor-blink {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 0;   }
    }

    /* ═══════════════════════════════════════════
       DASHBOARD STATE
    ═══════════════════════════════════════════ */

    #state-dashboard {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: none;
      flex-direction: column;
    }

    /* ── Header ── */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 22px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      font-family: var(--mono);
      font-size: 12.5px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 0.8px;
    }

    .brand-sub {
      color: var(--muted);
      font-weight: 400;
      font-size: 12px;
    }

    .header-badges {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ── Stats strip ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat-card {
      padding: 13px 20px 12px;
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .stat-card:last-child {
      border-right: none;
    }

    /* Amber left accent bar */
    .stat-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--amber), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .stat-card:first-child::before {
      opacity: 0.6;
    }

    /* Very subtle amber glow in card when first */
    .stat-card:first-child {
      background: linear-gradient(to right, rgba(200,136,10,0.03), transparent);
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .stat-sub {
      font-size: 11px;
      font-weight: 300;
      color: var(--muted);
      margin-top: 3px;
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 9px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 1px;
    }

    /* ── Main panels ── */
    .main-panels {
      display: flex;
      flex: 1;
      min-height: 0;
      padding: 12px 16px;
      gap: 12px;
    }

    /* Left: 2D scan canvas */
    .panel-left {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 6px;
    }

    /* Right: Three.js terrain */
    .panel-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 6px;
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 8.5px;
      font-weight: 500;
      color: var(--dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      padding-left: 2px;
    }

    /* Canvas wrapper — renderCanvas reads this element's dimensions */
    .panel-canvas-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    #scan-canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 5px;
      border: 1px solid var(--border);
    }

    /* Three.js wrapper */
    .panel-3d-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
      border-radius: 5px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    #three-container {
      position: absolute;
      inset: 0;
    }

    /* ── Footer ── */
    .dash-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 22px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .footer-info {
      font-family: var(--mono);
      font-size: 9.5px;
      color: var(--dim);
      letter-spacing: 0.8px;
    }

    .btn-load-new {
      font-family: var(--mono);
      padding: 5px 14px;
      background: transparent;
      border: 1px solid var(--border-hi);
      border-radius: 3px;
      color: var(--muted);
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
    }

    .btn-load-new:hover {
      background: var(--amber-dim);
      border-color: var(--amber);
      color: var(--amber-hi);
    }

    /* ── Error toast ── */
    #error-toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      background: #140909;
      border: 1px solid rgba(232, 80, 80, 0.35);
      color: var(--red);
      padding: 10px 20px;
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 11.5px;
      letter-spacing: 0.2px;
      display: none;
      z-index: 999;
      max-width: 80vw;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<!-- ── State 1: Drop Zone ─────────────────────────────────────────────────── -->
<div id="state-drop">
  <div class="drop-eyebrow">UltrasoundViz · Medical Imaging AI</div>

  <div class="drop-zone" id="drop-zone">
    <!-- Targeting reticle -->
    <svg class="drop-reticle" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="22" stroke="currentColor" stroke-width="1"/>
      <circle cx="28" cy="28" r="12" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="28" cy="28" r="3"  fill="currentColor"/>
      <line x1="28" y1="2"  x2="28" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="28" y1="42" x2="28" y2="54" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="2"  y1="28" x2="14" y2="28" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="42" y1="28" x2="54" y2="28" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>

    <div class="drop-title">Drop any ultrasound file</div>
    <div class="drop-sub">
      Drag and drop or click to browse<br>
      Runs the full AI segmentation pipeline
    </div>
    <div class="drop-formats">MHD · JPG · PNG · BMP · DCM · AVI · MP4</div>
  </div>

  <input type="file" id="file-input" style="display:none"
         accept=".mhd,.jpg,.jpeg,.png,.bmp,.dcm,.avi,.mp4">
</div>

<!-- ── State 2: Loading ───────────────────────────────────────────────────── -->
<div id="state-loading">
  <div class="loading-wordmark">UltrasoundViz</div>
  <div class="loading-ring">
    <div class="loading-dot"></div>
  </div>
  <div class="loading-status" id="loading-status">Initializing</div>
</div>

<!-- ── State 3: Dashboard ─────────────────────────────────────────────────── -->
<div id="state-dashboard">

  <header class="dash-header">
    <div class="brand">UltrasoundViz <span class="brand-sub">/ medical imaging</span></div>
    <div class="header-badges" id="header-badges"></div>
  </header>

  <div class="stats-row" id="stats-row"></div>

  <div class="main-panels">
    <div class="panel-left">
      <div class="panel-label">2D Scan + Mask Overlay</div>
      <div class="panel-canvas-wrap">
        <canvas id="scan-canvas"></canvas>
      </div>
    </div>
    <div class="panel-right">
      <div class="panel-label">3D Terrain · Interactive</div>
      <div class="panel-3d-wrap">
        <div id="three-container"></div>
      </div>
    </div>
  </div>

  <footer class="dash-footer">
    <span class="footer-info" id="footer-info"></span>
    <button class="btn-load-new" id="btn-load-new">← Load new file</button>
  </footer>

</div>

<!-- ── Error toast ────────────────────────────────────────────────────────── -->
<div id="error-toast"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Config ───────────────────────────────────────────────────────────────────

const API = 'http://localhost:8000/analyze';

const BADGE = {
  JugularVein:   { bg:'#3b82f622', text:'#3b82f6', border:'#3b82f655', rgb:[59,130,246] },
  CarotidArtery: { bg:'#06b6d422', text:'#06b6d4', border:'#06b6d455', rgb:[6,182,212] },
  FemoralArtery: { bg:'#06b6d422', text:'#06b6d4', border:'#06b6d455', rgb:[6,182,212] },
  LIDC:          { bg:'#ef444422', text:'#ef4444', border:'#ef444455', rgb:[239,68,68] },
  Heart:         { bg:'#f9731622', text:'#f97316', border:'#f9731655', rgb:[249,115,22] },
  Ball:          { bg:'#10b98122', text:'#10b981', border:'#10b98155', rgb:[16,185,129] },
};
const DEFAULT_BADGE = { bg:'#1c283888', text:'#415868', border:'#25364855', rgb:[65,88,104] };
const badgeFor = a => BADGE[a] || DEFAULT_BADGE;
const pctColor = v => v >= 75 ? '#3ecf8e' : v >= 50 ? '#e88020' : '#e85050';
const parsePct = s => parseFloat((s||'0').replace('%','')) || 0;

// ── Three.js state ────────────────────────────────────────────────────────────

let _renderer = null, _animId = null, _resizeObs = null;

function teardownThree() {
  if (_animId)    { cancelAnimationFrame(_animId); _animId = null; }
  if (_resizeObs) { _resizeObs.disconnect(); _resizeObs = null; }
  if (_renderer)  { _renderer.dispose(); _renderer = null; }
  const c = document.getElementById('three-container');
  if (c) c.innerHTML = '';
}

// ── State machine ─────────────────────────────────────────────────────────────

function showState(s) {
  document.getElementById('state-drop').style.display      = s === 'drop'      ? 'flex' : 'none';
  document.getElementById('state-loading').style.display   = s === 'loading'   ? 'flex' : 'none';
  document.getElementById('state-dashboard').style.display = s === 'dashboard' ? 'flex' : 'none';
}

function setStatus(msg) { document.getElementById('loading-status').textContent = msg; }

function showError(msg) {
  const el = document.getElementById('error-toast');
  el.textContent = '✕  ' + msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 6000);
  showState('drop');
}

// ── File input ────────────────────────────────────────────────────────────────

document.getElementById('drop-zone').addEventListener('click', () =>
  document.getElementById('file-input').click());

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

document.getElementById('btn-load-new').addEventListener('click', () => {
  teardownThree();
  document.getElementById('file-input').value = '';
  showState('drop');
});

// ── Upload & analyze ──────────────────────────────────────────────────────────

async function handleFile(file) {
  showState('loading');

  const msgs = ['Detecting format…', 'Running preprocessing…', 'Running inference…'];
  let i = 0;
  setStatus(msgs[i]);
  const ticker = setInterval(() => { i = (i + 1) % msgs.length; setStatus(msgs[i]); }, 900);

  try {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch(API, { method: 'POST', body: fd });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Server error ${res.status}`);
    }
    const data = await res.json();
    clearInterval(ticker);
    setStatus('Rendering 3D…');
    await new Promise(r => setTimeout(r, 200));
    showDashboard(data);
  } catch (err) {
    clearInterval(ticker);
    showError(err.message);
  }
}

// ── Dashboard ─────────────────────────────────────────────────────────────────

function showDashboard(data) {
  showState('dashboard');
  renderHeader(data);
  renderStats(data);
  renderCanvas(data);
  renderTerrain(data);
  document.getElementById('footer-info').textContent =
    `${data.anatomy} · ${data.dimensionality} · rotate · zoom · pan`;
}

function renderHeader(data) {
  const c = badgeFor(data.anatomy);
  document.getElementById('header-badges').innerHTML =
    `<span class="badge" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${data.anatomy}</span>
     <span class="badge" style="background:#0c1119;color:#415868;border:1px solid #172030;letter-spacing:1px">
       ${data.format.toUpperCase()} &middot; ${data.dimensionality}
     </span>`;
}

function renderStats(data) {
  const c = badgeFor(data.anatomy);
  const detColor = data.detected ? '#3ecf8e' : '#e85050';
  const detText  = data.detected ? '&#10003; Detected' : '&#10007; Not found';
  const covPct   = parsePct(data.coverage);
  const confPct  = parsePct(data.mean_confidence);
  const covColor  = pctColor(covPct);
  const confColor = pctColor(confPct);

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Anatomy</div>
      <div class="stat-value" style="font-size:17px;color:${c.text}">${data.anatomy}</div>
      <div class="stat-sub">${data.dimensionality}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Detection</div>
      <div class="stat-value" style="font-size:15px;color:${detColor}">${detText}</div>
      <div class="stat-sub">structure in scan</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Coverage</div>
      <div class="stat-value" style="color:${covColor}">${data.coverage}</div>
      <div class="stat-sub">of image area</div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${Math.min(covPct,100)}%;background:${covColor}"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mean Confidence</div>
      <div class="stat-value" style="color:${confColor}">${data.mean_confidence}</div>
      <div class="stat-sub">model certainty</div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${Math.min(confPct,100)}%;background:${confColor}"></div>
      </div>
    </div>`;
}

// ── Canvas (left panel) ───────────────────────────────────────────────────────

function renderCanvas(data) {
  const canvas = document.getElementById('scan-canvas');
  const parent = canvas.parentElement;  // .panel-canvas-wrap
  const cW = parent.clientWidth  || 400;
  const cH = parent.clientHeight || 400;
  canvas.width  = cW;
  canvas.height = cH;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#05060a';
  ctx.fillRect(0, 0, cW, cH);

  const img = new Image();
  img.onload = () => {
    // Fit-contain
    const scale = Math.min(cW / img.width, cH / img.height);
    const dw = Math.round(img.width  * scale);
    const dh = Math.round(img.height * scale);
    const ox = Math.round((cW - dw) / 2);
    const oy = Math.round((cH - dh) / 2);
    ctx.drawImage(img, ox, oy, dw, dh);

    const mask = data.binary_mask;
    const rows = mask.length, cols = mask[0].length;
    const [r, g, b] = badgeFor(data.anatomy).rgb;

    // Offscreen at mask resolution: filled overlay + bright contour
    const off = document.createElement('canvas');
    off.width = cols; off.height = rows;
    const octx = off.getContext('2d');

    // Semi-transparent fill
    const fill = octx.createImageData(cols, rows);
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        if (!mask[y][x]) continue;
        const i = (y * cols + x) * 4;
        fill.data[i]=r; fill.data[i+1]=g; fill.data[i+2]=b; fill.data[i+3]=80;
      }
    }
    octx.putImageData(fill, 0, 0);
    ctx.drawImage(off, ox, oy, dw, dh);

    // Bright contour outline
    const contour = octx.createImageData(cols, rows);
    for (let y = 1; y < rows - 1; y++) {
      for (let x = 1; x < cols - 1; x++) {
        if (!mask[y][x]) continue;
        if (!mask[y-1][x] || !mask[y+1][x] || !mask[y][x-1] || !mask[y][x+1]) {
          const i = (y * cols + x) * 4;
          contour.data[i]=r; contour.data[i+1]=g; contour.data[i+2]=b; contour.data[i+3]=230;
        }
      }
    }
    octx.clearRect(0, 0, cols, rows);
    octx.putImageData(contour, 0, 0);
    ctx.drawImage(off, ox, oy, dw, dh);
  };
  img.src = 'data:image/png;base64,' + data.original_image;
}

// ── Three.js terrain (right panel) ───────────────────────────────────────────

// Matplotlib 'hot' colormap: black → red → orange/yellow → white
function hotColor(t) {
  t = Math.max(0, Math.min(1, t));
  let r, g, b;
  if (t < 0.365) {
    r = t / 0.365; g = 0; b = 0;
  } else if (t < 0.745) {
    r = 1; g = (t - 0.365) / 0.38; b = 0;
  } else {
    r = 1; g = 1; b = (t - 0.745) / 0.255;
  }
  return [r, g, b];
}

function renderTerrain(data) {
  teardownThree();

  const container = document.getElementById('three-container');
  const W = container.clientWidth  || 600;
  const H = container.clientHeight || 400;

  const probMap = data.probability_map;
  const mask    = data.binary_mask;
  const rows    = probMap.length;
  const cols    = probMap[0].length;

  // Scene & renderer
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05060a);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);
  _renderer = renderer;

  const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 5000);

  // Terrain geometry in XZ plane, Y = height
  const scaleX      = cols;
  const scaleZ      = rows;
  const heightScale = Math.max(cols, rows) * 0.35;

  const positions = new Float32Array(rows * cols * 3);
  const colors    = new Float32Array(rows * cols * 3);
  const indices   = [];
  let maxH = 0;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const v   = probMap[row][col];
      const h   = v * heightScale;
      if (h > maxH) maxH = h;
      const idx = (row * cols + col) * 3;
      positions[idx]   = (col / (cols - 1) - 0.5) * scaleX;
      positions[idx+1] = h;
      positions[idx+2] = (row / (rows - 1) - 0.5) * scaleZ;
      const [r,g,b] = hotColor(v);
      colors[idx]=r; colors[idx+1]=g; colors[idx+2]=b;
    }
  }

  for (let row = 0; row < rows - 1; row++) {
    for (let col = 0; col < cols - 1; col++) {
      const tl = row * cols + col;
      indices.push(tl, tl+cols, tl+1, tl+1, tl+cols, tl+cols+1);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  scene.add(new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    vertexColors: true,
    side: THREE.DoubleSide,
    roughness: 0.75,
    metalness: 0.1,
  })));

  // Boundary contour as LineSegments at peak height
  const linePos = [];
  const contourY = maxH + heightScale * 0.03;
  const xStep = scaleX / (cols - 1);
  const zStep = scaleZ / (rows - 1);

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const here = mask[row][col];
      if (col + 1 < cols && mask[row][col+1] !== here) {
        const x  = (col / (cols-1) - 0.5) * scaleX + xStep * 0.5;
        const z0 = (row / (rows-1) - 0.5) * scaleZ;
        linePos.push(x, contourY, z0,  x, contourY, z0 + zStep);
      }
      if (row + 1 < rows && mask[row+1][col] !== here) {
        const z  = (row / (rows-1) - 0.5) * scaleZ + zStep * 0.5;
        const x0 = (col / (cols-1) - 0.5) * scaleX;
        linePos.push(x0, contourY, z,  x0 + xStep, contourY, z);
      }
    }
  }

  if (linePos.length > 0) {
    const lg = new THREE.BufferGeometry();
    lg.setAttribute('position', new THREE.Float32BufferAttribute(linePos, 3));
    const lineColor = new THREE.Color(badgeFor(data.anatomy).text);
    scene.add(new THREE.LineSegments(lg, new THREE.LineBasicMaterial({ color: lineColor })));
  }

  // Lights
  scene.add(new THREE.AmbientLight(0x555555, 1.2));
  const sun = new THREE.DirectionalLight(0xffffff, 1.8);
  sun.position.set(scaleX * 0.6, heightScale * 2.5, scaleZ * 0.3);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x2244aa, 0.4);
  fill.position.set(-scaleX * 0.5, heightScale, -scaleZ * 0.5);
  scene.add(fill);

  // Camera: 45° above terrain looking at centre
  const camDist = Math.max(scaleX, scaleZ) * 1.1;
  camera.position.set(camDist * 0.75, maxH + heightScale * 0.9, camDist * 0.75);
  const target = new THREE.Vector3(0, maxH * 0.25, 0);
  camera.lookAt(target);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.copy(target);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 10;
  controls.maxDistance = camDist * 4;
  controls.update();

  // Resize observer
  _resizeObs = new ResizeObserver(() => {
    const nW = container.clientWidth;
    const nH = container.clientHeight;
    if (!nW || !nH) return;
    camera.aspect = nW / nH;
    camera.updateProjectionMatrix();
    renderer.setSize(nW, nH);
  });
  _resizeObs.observe(container);

  // Render loop
  function animate() {
    _animId = requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
}

window.__handleFile = handleFile;
</script>
